# Production profile — activate with: SPRING_PROFILES_ACTIVE=prod
server.port=${SERVER_PORT:8085}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate

# ===== MICROSERVICE URLs (Docker/K8s service names) =====
services.auth.url=${AUTH_SERVICE_URL:http://authservice:8081}
services.event.url=${EVENT_SERVICE_URL:http://event-service:8088}
services.notification.url=${NOTIFICATION_SERVICE_URL:http://notif-service:9090}
services.payment.url=${PAYMENT_SERVICE_URL:http://paymentservice:9099}

# ===== RABBITMQ =====
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ===== LOGGING =====
logging.level.com.example.registration_service=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
