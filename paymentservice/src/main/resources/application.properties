spring.application.name=paymentservice

spring.config.import=optional:file:.env[.properties]

# ===== SERVER CONFIGURATION =====
server.port=${SERVER_PORT:9099}

# ===== JWT CONFIGURATION =====
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=${JWT_EXPIRATION:100000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:604800000}

# ===== DATABASE CONFIGURATION =====
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ===== LOGGING CONFIGURATION =====
logging.file.name=${LOGGING_FILE_NAME:Logs/paymentservice.log}
logging.logback.rollingpolicy.max-file-size=${LOGGING_MAX_FILE_SIZE:10MB}
logging.logback.rollingpolicy.max-history=${LOGGING_MAX_HISTORY:30}
logging.logback.rollingpolicy.file-name-pattern=${LOGGING_FILE_NAME_PATTERN:Logs/paymentservice-%d{yyyy-MM-dd}.%i.log}
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{20} - %msg%n

# ===== Application Logging Levels =====
logging.level.com.example.paymentservice=${LOGGING_LEVEL_PAYMENTSERVICE:DEBUG}
logging.level.org.springframework.security=${LOGGING_LEVEL_SECURITY:INFO}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE:DEBUG}

# ===== RABBITMQ CONFIGURATION =====
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ===== MICROSERVICE URLs =====
services.auth.url=${AUTH_SERVICE_URL:http://localhost:8081}
services.event.url=${EVENT_SERVICE_URL:http://localhost:8088}
services.registration.url=${REGISTRATION_SERVICE_URL:http://localhost:8085}
services.notification.url=${NOTIFICATION_SERVICE_URL:http://localhost:9090}

# ===== AOP =====
aop.enabled=true
