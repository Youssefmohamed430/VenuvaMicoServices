# Production profile — activate with: SPRING_PROFILES_ACTIVE=prod
# All values are injected from Docker/K8s environment variables

# ===== SERVER =====
server.port=${SERVER_PORT:8081}

# ===== DATABASE =====
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate

# ===== MICROSERVICE URLs (Docker/K8s service names) =====
services.event.url=${EVENT_SERVICE_URL:http://event-service:8088}
services.registration.url=${REGISTRATION_SERVICE_URL:http://registration-service:8085}
services.notification.url=${NOTIFICATION_SERVICE_URL:http://notif-service:9090}
services.payment.url=${PAYMENT_SERVICE_URL:http://paymentservice:9099}

# ===== RABBITMQ =====
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ===== LOGGING (Production — INFO level) =====
logging.level.com.example.authservice=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
