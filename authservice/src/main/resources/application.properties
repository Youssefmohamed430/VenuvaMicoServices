spring.application.name=authservice

spring.config.import=optional:file:.env[.properties]

# ===== SERVER CONFIGURATION =====
server.port=${SERVER_PORT:8080}

# ===== JWT CONFIGURATION =====
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION}

# ===== DATABASE CONFIGURATION =====
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===== LOGGING CONFIGURATION =====
logging.file.name=${LOGGING_FILE_NAME:Logs/venuva.log}
logging.logback.rollingpolicy.max-file-size=${LOGGING_MAX_FILE_SIZE:10MB}
logging.logback.rollingpolicy.max-history=${LOGGING_MAX_HISTORY:30}
logging.logback.rollingpolicy.file-name-pattern=${LOGGING_FILE_NAME_PATTERN:Logs/venuva-%d{yyyy-MM-dd}.%i.log}
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{20} - %msg%n

# ===== Application Logging Levels =====
logging.level.com.example.venuva=${LOGGING_LEVEL_VENUVA:DEBUG}
logging.level.org.springframework.security=${LOGGING_LEVEL_SECURITY:INFO}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE:DEBUG}

