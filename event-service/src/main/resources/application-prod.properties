# Production profile — activate with: SPRING_PROFILES_ACTIVE=prod
server.port=${SERVER_PORT:8088}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate

services.auth.url=${AUTH_SERVICE_URL:http://authservice:8081}
services.registration.url=${REGISTRATION_SERVICE_URL:http://registration-service:8085}
services.notification.url=${NOTIFICATION_SERVICE_URL:http://notif-service:9090}
services.payment.url=${PAYMENT_SERVICE_URL:http://paymentservice:9099}

spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

logging.level.com.example.event_service=INFO
logging.level.org.hibernate.SQL=WARN
