version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: authservice/Dockerfile
    container_name: auth-service
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      JWT_SECRET: c2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24td2l0aC1lbm91Z2gtbGVuZ3Ro
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_EXPIRATION: 604800000
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/venuvadb?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      RABBITMQ_HOST: rabbitmq
      EVENT_SERVICE_URL: http://event-service:8088
      REGISTRATION_SERVICE_URL: http://registration-service:8085
      NOTIFICATION_SERVICE_URL: http://notif-service:9090
      PAYMENT_SERVICE_URL: http://paymentservice:9099
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy

  registration-service:
    build:
      context: .
      dockerfile: registration-service/Dockerfile
    container_name: registration-service
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/venuvadb?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy

  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
    container_name: event-service
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8088
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/event_service?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy

  notif-service:
    build:
      context: .
      dockerfile: notif-service/Dockerfile
    container_name: notif-service
    ports:
      - "9090:9090"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 9090
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/venuvadb?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy

  paymentservice:
    build:
      context: .
      dockerfile: paymentservice/Dockerfile
    container_name: paymentservice
    ports:
      - "9099:9099"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 9099
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/venuvadb?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
