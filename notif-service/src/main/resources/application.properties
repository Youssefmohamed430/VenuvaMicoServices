spring.application.name=notif-service
spring.config.import=optional:file:.env[.properties]

# ===== SERVER CONFIGURATION =====
server.port=${SERVER_PORT:9090}

# ===== JWT CONFIGURATION =====
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION}

# ===== DATABASE CONFIGURATION =====
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===== EMAIL CONFIGURATION (Gmail SMTP) =====
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}


# ===== LOGGING CONFIGURATION =====
logging.file.name=${LOGGING_FILE_NAME:Logs/notif-service.log}
logging.logback.rollingpolicy.max-file-size=${LOGGING_MAX_FILE_SIZE:10MB}
logging.logback.rollingpolicy.max-history=${LOGGING_MAX_HISTORY:30}
logging.logback.rollingpolicy.file-name-pattern=${LOGGING_FILE_NAME_PATTERN:Logs/notif-service-%d{yyyy-MM-dd}.%i.log}
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{20} - %msg%n

# ===== Application Logging Levels =====
logging.level.com.example.notif_service=${LOGGING_LEVEL_VENUVA:DEBUG}
logging.level.org.springframework.security=${LOGGING_LEVEL_SECURITY:INFO}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE:DEBUG}

# ===== RABBITMQ CONFIGURATION =====
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ===== MICROSERVICE URLs =====
services.auth.url=${AUTH_SERVICE_URL:http://localhost:8081}
services.event.url=${EVENT_SERVICE_URL:http://localhost:8088}
services.registration.url=${REGISTRATION_SERVICE_URL:http://localhost:8085}
services.payment.url=${PAYMENT_SERVICE_URL:http://localhost:9099}

# ===== AOP =====
aop.enabled=true
