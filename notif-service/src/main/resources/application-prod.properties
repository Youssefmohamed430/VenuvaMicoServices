# Production profile — activate with: SPRING_PROFILES_ACTIVE=prod
server.port=${SERVER_PORT:9090}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate

services.auth.url=${AUTH_SERVICE_URL:http://authservice:8081}
services.event.url=${EVENT_SERVICE_URL:http://event-service:8088}
services.registration.url=${REGISTRATION_SERVICE_URL:http://registration-service:8085}
services.payment.url=${PAYMENT_SERVICE_URL:http://paymentservice:9099}

spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

logging.level.com.example.notif_service=INFO
logging.level.org.hibernate.SQL=WARN
